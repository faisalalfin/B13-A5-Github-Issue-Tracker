<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyUI -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-96 max-w-md mx-auto my-8 shadow-md rounded-md">
    <div class="logo w-[80px] mx-auto pt-8">
      <img src="./assets/github-logo.png"alt="" />
    </div>
    <div class="text-center pt-6">
      <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
      <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>

    <div class="form pt-1">
      <div class="card bg-base-100 w-full max-w-md shrink-0 mx-auto">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-base text-neutral">Username</label>
            <input id="input-name" minlength="5" maxlength="16" type="name" class="input w-full" placeholder="Enter Username" />
            <div>
              <p class="text-primary text-sm">Default: admin</p>
            </div>
            <label class="label font-medium text-base text-neutral pt-2"
              >Password</label
            >
            <input id="input-pass" maxlength="12" type="password" class="input w-full" placeholder="Enter Password" />
            <div>
              <p class="text-primary text-sm">Default: admin123</p>
            </div>
            <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
            <div
              class="divider text-gray-400 before:bg-gray-300 after:bg-gray-300"
            >
              <h3 class="text-neutral text-lg">OR</h3>
            </div>

            <div class="text-center text-sm">
              <p>Demo Credentials:</p>
              <div class="bg-base-200 py-3 rounded-md mt-1">
                <h3><span class="font-bold">Username:</span> admin</h3>
                <h3><span class="font-bold">Password:</span> admin123</h3>
              </div>
            </div>
          </fieldset>
        </div>
      </div>
    </div>
    <script src="./script/login.js"></script>
  </body>
</html>
