<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-base-200 min-h-screen">
    <!-- NAVBAR -->

    <div class="navbar bg-base-100 shadow-sm px-4 md:px-6">
      <div
        class="flex flex-col md:flex-row md:items-center md:justify-between w-full gap-3"
      >
        <!-- LEFT -->

        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-purple-100 flex justify-center items-center"
          >
            <img src="./assets/github-logo.png" class="w-6" />
          </div>

          <h2 class="font-semibold text-lg md:text-xl">
            GitHub Issues Tracker
          </h2>
        </div>

        <!-- RIGHT -->

        <div class="flex gap-2 w-full md:w-auto">
          <input
            id="search-box"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-full md:w-64"
          />

          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 md:py-10">
      <!-- FILTER -->

      <div class="flex flex-wrap gap-3 bg-white p-4 rounded-lg shadow-sm">
        <button id="all-btn" class="filter-btn btn btn-primary">All</button>

        <button
          id="open-btn"
          class="filter-btn btn btn-ghost border text-gray-500"
        >
          Open
        </button>

        <button
          id="closed-btn"
          class="filter-btn btn btn-ghost border text-gray-500"
        >
          Closed
        </button>
      </div>

      <!-- HEADER -->

      <div class="bg-white p-5 mt-6 rounded-lg shadow-sm">
        <div
          class="flex flex-col md:flex-row md:justify-between md:items-center gap-4"
        >
          <div class="flex gap-3 items-center">
            <div
              class="w-12 h-12 md:w-14 md:h-14 bg-purple-100 rounded-full flex items-center justify-center"
            >
              <img src="./assets/Aperture.png" alt="">
            </div>

            <div>
              <h2 id="issue-count" class="font-semibold text-lg md:text-xl">
                0 Issues
              </h2>

              <p class="text-gray-500 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex gap-6 text-sm">
            <span class="flex gap-2 items-center">
              <span class="w-2.5 h-2.5 bg-green-500 rounded-full"> </span>

              Open
            </span>

            <span class="flex gap-2 items-center">
              <span class="w-2.5 h-2.5 bg-purple-500 rounded-full"> </span>

              Closed
            </span>
          </div>
        </div>
      </div>

      <!-- ISSUES -->

      <div
        id="issues-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5 mt-6"
      ></div>
    </main>

    <!-- MODAL -->

    <dialog id="issue_modal" class="modal">
      <div class="modal-box w-11/12 max-w-2xl">
        <h2 id="modal-title" class="text-xl font-bold"></h2>

        <div class="flex flex-wrap items-center gap-3 mt-2 text-sm">
          <span
            id="modal-status"
            class="px-3 py-1 rounded-full text-white text-xs"
          >
          </span>

          <span id="modal-author" class="text-gray-500"></span>

          <span id="modal-date" class="text-gray-400"></span>
        </div>

        <div class="flex gap-2 mt-4 flex-wrap">
          <span class="text-xs px-2 py-1 rounded bg-red-100 text-red-500">
            BUG
          </span>

          <span class="text-xs px-2 py-1 rounded bg-yellow-100 text-yellow-600">
            HELP WANTED
          </span>
        </div>

        <p id="modal-desc" class="mt-4 text-gray-600"></p>

        <div
          class="bg-base-200 p-4 rounded-lg mt-6 flex flex-col md:flex-row gap-4 md:justify-between"
        >
          <div>
            <p class="text-sm text-gray-500">Assignee:</p>

            <p id="modal-assignee" class="font-semibold"></p>
          </div>

          <div>
            <p class="text-sm text-gray-500">Priority:</p>

            <span id="modal-priority" class="px-3 py-1 rounded-full text-xs">
            </span>
          </div>
        </div>

        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script/script.js"></script>
  </body>
</html>
